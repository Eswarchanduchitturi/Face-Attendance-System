<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Attendance System</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-main: #f3f5f8;
            --bg-panel: #ffffff;
            --bg-soft: #eef3f6;
            --border: #d9e0e6;
            --text: #0f1720;
            --muted: #5b6b79;
            --brand: #0d6efd;
            --brand-dark: #0a4fb4;
            --accent: #111111;
            --success: #0d6efd;
            --danger: #dc3545;
            --shadow: 0 18px 50px rgba(9, 30, 66, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Outfit", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 10% 10%, #d7ece8 0%, transparent 32%),
                radial-gradient(circle at 85% 5%, #fce9db 0%, transparent 30%),
                var(--bg-main);
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
            gap: 16px;
            padding: 14px;
        }

        .sidebar {
            width: 270px;
            background: linear-gradient(180deg, #f8fbfd 0%, #eef4f8 100%);
            border: 1px solid #d9e0e6;
            border-radius: 24px;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow);
            position: sticky;
            top: 14px;
            height: calc(100vh - 28px);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 8px 10px 16px;
            border-bottom: 1px solid #d9e0e6;
            margin-bottom: 14px;
        }

        .logo-text {
            font-family: "Sora", sans-serif;
            font-size: 34px;
            letter-spacing: 1.4px;
            font-weight: 900;
            color: #1f3546;
            text-align: center;
            width: 100%;
        }

        .sidebar-links,
        .sidebar-footer {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid #d9e0e6;
        }

        .side-link,
        .folder-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #355165;
            background: transparent;
            border-radius: 12px;
            padding: 10px 12px;
            transition: all 0.25s ease;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .side-link i,
        .folder-toggle i {
            width: 18px;
            text-align: center;
        }

        .side-link:hover,
        .folder-toggle:hover {
            color: #0f1720;
            background: #e6eff5;
            border-color: #d0dde7;
            transform: translateX(2px);
        }

        .side-link.active-link {
            color: #ffffff !important;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
            border-color: #0b5ed7;
        }

        .submenu {
            display: none;
            margin: 4px 0 8px 8px;
            border-left: 1px dashed #bfd0dc;
            padding-left: 10px;
        }

        .show-submenu { display: block; }

        .side-sublink {
            display: block;
            text-decoration: none;
            color: #4f697b;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 13px;
            transition: all 0.25s ease;
            margin: 3px 0;
        }

        .side-sublink:hover {
            color: #18384a;
            background: #eaf2f8;
        }

        #liveChevron { transition: transform 0.2s ease; }

        .main-panel {
            flex: 1;
            min-width: 0;
            background: var(--bg-panel);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            min-height: 74px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(10px);
        }

        .topbar-meta {
            display: grid;
            gap: 2px;
        }

        .topbar-title {
            font-family: "Sora", sans-serif;
            font-size: 19px;
            font-weight: 600;
            color: var(--text);
        }

        .topbar-subtitle {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.25;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-chip {
            border: 1px solid var(--border);
            background: var(--bg-soft);
            color: var(--muted);
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .content-area {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
            animation: fadePage 0.35s ease;
        }

        @keyframes fadePage {
            from { opacity: 0; transform: translateY(7px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .frosted-card,
        .support-card {
            background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 12px 30px rgba(15, 23, 32, 0.06);
        }

        .modern-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .modern-table thead th {
            background: #f3f7f9;
            color: #33414d;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1px solid var(--border);
            padding: 14px 12px;
        }

        .modern-table td {
            padding: 12px;
            border-bottom: 1px solid #edf2f5;
            vertical-align: middle;
        }

        .modern-table tr:last-child td {
            border-bottom: none;
        }

        .modern-table tbody tr:hover {
            background: #f9fbfd;
        }

        .btn {
            border-radius: 11px;
            font-weight: 600;
            border-width: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #111111 0%, #242424 100%);
            border-color: #111111;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #000000 0%, #191919 100%);
            border-color: #000000;
        }

        .btn-outline-secondary {
            border-color: #cfd9e0;
            color: #2c3e4d;
        }

        .btn-outline-secondary:hover {
            background: #eef3f7;
            border-color: #c2ced8;
            color: #1f2d39;
        }

        .form-control,
        .form-select {
            border-radius: 11px;
            border: 1px solid #cfd9e0;
            padding: 10px 12px;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #41a59c;
            box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.15);
        }

        .center-message {
            position: fixed;
            inset: 0;
            background: rgba(17, 27, 39, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .message-card {
            min-width: 320px;
            max-width: 520px;
            background: #ffffff;
            border-radius: 18px;
            border: 1px solid #d8e1e7;
            padding: 24px;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            box-shadow: 0 24px 60px rgba(15, 23, 32, 0.25);
        }

        .top-toast {
            position: fixed;
            top: 26px;
            right: 26px;
            background: #132a3c;
            color: #f1f7fb;
            border: 1px solid #294861;
            padding: 12px 18px;
            border-radius: 12px;
            z-index: 9999;
            box-shadow: 0 16px 34px rgba(15, 23, 32, 0.2);
            transform: translateY(-8px);
            opacity: 0;
            transition: all 0.25s ease;
        }

        .top-toast.show-toast {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 1100px) {
            .app-layout {
                display: block;
                padding: 0;
            }

            .sidebar {
                width: 100%;
                height: auto;
                border-radius: 0;
                position: relative;
                top: 0;
                box-shadow: none;
            }

            .main-panel {
                border-radius: 0;
                min-height: calc(100vh - 180px);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-text">
                    FAS
                </div>
            </div>

            <div class="sidebar-links">
                <div class="sidebar-folder">
                    <div class="side-link folder-toggle" onclick="toggleLiveFolder()">
                        <i class="fa-solid fa-video"></i>
                        <span>Live Sessions</span>
                        <i id="liveChevron" class="fa-solid fa-chevron-down ms-auto small"></i>
                    </div>
                    <div id="liveSubmenu" class="submenu">
                        <a href="/" class="side-sublink" onclick="setMode('checkin')">Check-In Session</a>
                        <a href="/" class="side-sublink" onclick="setMode('checkout')">Check-Out Session</a>
                    </div>
                </div>

                <a href="/enroll" class="side-link">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Enroll</span>
                </a>

                <a href="/attendance" class="side-link">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Attendance</span>
                </a>

                <a href="/attendance/analytics" class="side-link">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Analytics</span>
                </a>

                <a href="/payroll" class="side-link">
                    <i class="fa-solid fa-wallet"></i>
                    <span>Payroll</span>
                </a>

                <a href="/support" class="side-link">
                    <i class="fa-solid fa-comments"></i>
                    <span>Help Desk</span>
                </a>
            </div>

            <div class="sidebar-footer">
                <a href="/copilot" class="side-link">
                    <i class="fa-solid fa-robot"></i>
                    <span>FAS Copilot</span>
                </a>

                <a href="/login" class="side-link">
                    <i class="fa-solid fa-user-shield"></i>
                    <span>Admin</span>
                </a>
            </div>
        </aside>

        <main class="main-panel">
            <div class="topbar">
                <div class="topbar-meta">
                    <span class="topbar-title">{% block page_title %}Dashboard{% endblock %}</span>
                    {% block page_subtitle %}{% endblock %}
                </div>
                <div class="topbar-right">{% block topbar_badges %}
                    <span class="topbar-chip"><i class="fa-regular fa-clock me-1"></i> Real-time</span>
                    <span class="topbar-chip"><i class="fa-solid fa-shield-halved me-1"></i> Secure</span>
                {% endblock %}</div>
            </div>
            <div class="content-area">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <div id="centerMessage" class="center-message d-none">
        <div class="message-card">
            <div id="messageText"></div>
        </div>
    </div>

    <div id="topToast" class="top-toast d-none">
        <span id="topToastText"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleLiveFolder() {
            const menu = document.getElementById("liveSubmenu");
            const icon = document.getElementById("liveChevron");
            menu.classList.toggle("show-submenu");
            icon.style.transform = menu.classList.contains("show-submenu") ? "rotate(180deg)" : "rotate(0deg)";
        }

        async function setMode(mode) {
            await fetch(`/set_mode/${mode}`);
            showCenterMessage("Mode changed to " + mode.toUpperCase());
        }

        function showCenterMessage(msg, success = true) {
            const box = document.getElementById("centerMessage");
            const text = document.getElementById("messageText");
            text.innerText = msg;
            text.style.color = success ? "#0d6efd" : "#cf2e2e";
            box.classList.remove("d-none");
            setTimeout(() => box.classList.add("d-none"), 2400);
        }

        function showTopToast(message) {
            const toast = document.getElementById("topToast");
            const text = document.getElementById("topToastText");
            text.innerText = message;
            toast.classList.remove("d-none");
            toast.classList.add("show-toast");
            setTimeout(() => {
                toast.classList.remove("show-toast");
                setTimeout(() => toast.classList.add("d-none"), 280);
            }, 2600);
        }

        (function activateCurrentNav() {
            const path = window.location.pathname;
            const links = Array.from(document.querySelectorAll(".side-link[href]"));
            let bestMatch = null;
            let bestLength = -1;

            links.forEach((link) => {
                const href = link.getAttribute("href");
                if (!href) return;

                const isExactRoot = href === "/" && path === "/";
                const isPrefixMatch = href !== "/" && path.startsWith(href);

                if (isExactRoot || isPrefixMatch) {
                    if (href.length > bestLength) {
                        bestLength = href.length;
                        bestMatch = link;
                    }
                }
            });

            if (bestMatch) {
                bestMatch.classList.add("active-link");
            }
        })();
    </script>
</body>
</html>
