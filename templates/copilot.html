{% extends "base.html" %}
{% block content %}

<div class="copilot-shell">
    <section class="copilot-hero">
        <div class="copilot-hero-icon">
            <i class="fa-solid fa-robot"></i>
        </div>
        <div>
            <h2>FAS Copilot</h2>
            <p>Ask anything about attendance workflow, admin tools, analytics, and troubleshooting.</p>
        </div>
    </section>

    <section class="copilot-chat-card">
        <div id="chatBox" class="chat-box"></div>

        <div class="quick-prompts" id="quickPrompts">
            <button type="button" class="prompt-chip" onclick="usePrompt('How to check in?')">How to check in?</button>
            <button type="button" class="prompt-chip" onclick="usePrompt('How to check out?')">How to check out?</button>
            <button type="button" class="prompt-chip" onclick="usePrompt('How to view attendance analytics?')">View analytics</button>
            <button type="button" class="prompt-chip" onclick="usePrompt('Camera not working')">Camera issue</button>
        </div>

        <div class="chat-input-area">
            <input type="text"
                   id="chatInput"
                   placeholder="Ask me about attendance, admin tools, analytics..."
                   onkeypress="if(event.key==='Enter') sendMessage()">

            <button type="button" id="sendBtn" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
                <span>Send</span>
            </button>
        </div>
    </section>
</div>

<style>
.copilot-shell {
    max-width: 1080px;
    margin: 0 auto;
    display: grid;
    gap: 18px;
}

.copilot-hero {
    background: linear-gradient(130deg, #101419 0%, #0d6efd 58%, #cf2e2e 100%);
    color: #ffffff;
    border-radius: 20px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 16px 34px rgba(11, 28, 58, 0.20);
}

.copilot-hero-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    background: rgba(255, 255, 255, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.34);
}

.copilot-hero h2 {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
}

.copilot-hero p {
    margin: 4px 0 0;
    font-size: 13px;
    opacity: 0.92;
}

.copilot-chat-card {
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    border: 1px solid #dbe5f0;
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 12px 30px rgba(16, 24, 40, 0.08);
}

.chat-box {
    height: 56vh;
    min-height: 360px;
    max-height: 640px;
    overflow-y: auto;
    padding: 12px 8px 14px;
    border-radius: 14px;
    background:
        radial-gradient(circle at 18% 12%, rgba(13, 110, 253, 0.10), transparent 40%),
        radial-gradient(circle at 88% 8%, rgba(207, 46, 46, 0.08), transparent 34%),
        #f3f8fc;
    border: 1px solid #d8e3ef;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.bot-msg-round,
.user-msg-glass {
    max-width: min(78%, 760px);
    border-radius: 14px;
    padding: 11px 13px;
    line-height: 1.45;
    font-size: 14px;
    word-break: break-word;
}

.bot-msg-round {
    align-self: flex-start;
    background: #ffffff;
    color: #162333;
    border: 1px solid #d7e2ef;
    box-shadow: 0 6px 16px rgba(19, 36, 62, 0.08);
}

.user-msg-glass {
    align-self: flex-end;
    background: linear-gradient(135deg, #0e1318 0%, #0d6efd 100%);
    color: #ffffff;
    border: 1px solid #1e64ce;
    box-shadow: 0 8px 20px rgba(9, 30, 66, 0.25);
}

.quick-prompts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 12px 0 10px;
}

.prompt-chip {
    border: 1px solid #cfddee;
    background: #ffffff;
    color: #153252;
    border-radius: 999px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s ease;
}

.prompt-chip:hover {
    border-color: #0d6efd;
    color: #0d6efd;
    transform: translateY(-1px);
}

.chat-input-area {
    display: flex;
    gap: 10px;
}

.chat-input-area input {
    flex: 1;
    border: 1px solid #cfddee;
    background: #ffffff;
    border-radius: 12px;
    min-height: 46px;
    padding: 0 14px;
    font-size: 14px;
    color: #0f1720;
}

.chat-input-area input:focus {
    outline: none;
    border-color: #0d6efd;
    box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.14);
}

.chat-input-area button {
    border: none;
    border-radius: 12px;
    min-width: 118px;
    padding: 0 16px;
    color: #ffffff;
    font-weight: 700;
    font-size: 14px;
    background: linear-gradient(135deg, #121417 0%, #0d6efd 100%);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.chat-input-area button:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(13, 110, 253, 0.32);
}

.chat-input-area button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

@media (max-width: 768px) {
    .copilot-hero {
        border-radius: 16px;
        padding: 14px;
    }

    .copilot-hero h2 {
        font-size: 20px;
    }

    .chat-box {
        height: 50vh;
    }

    .bot-msg-round,
    .user-msg-glass {
        max-width: 90%;
    }

    .chat-input-area {
        flex-direction: column;
    }

    .chat-input-area button {
        width: 100%;
        min-height: 44px;
    }
}
</style>

<script>
const chatBox = document.getElementById("chatBox");
const chatInput = document.getElementById("chatInput");
const sendBtn = document.getElementById("sendBtn");

appendMessage("FAS Copilot", "Hello. I can guide you with check-in/check-out, attendance analytics, admin tasks, and camera troubleshooting.");

function sendMessage(){
    const message = chatInput.value.trim();
    if(!message) return;

    appendMessage("You", message);
    sendBtn.disabled = true;

    fetch("/ai_assistant", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res => res.json())
    .then(data => {
        appendMessage("FAS Copilot", data.reply);
    })
    .catch(() => {
        appendMessage("FAS Copilot", "Unable to connect right now. Please try again.");
    })
    .finally(() => {
        sendBtn.disabled = false;
        chatInput.focus();
    });

    chatInput.value = "";
}

function usePrompt(text) {
    chatInput.value = text;
    sendMessage();
}

function appendMessage(sender, text){
    const msg = document.createElement("div");
    msg.className = sender === "You" ? "user-msg-glass" : "bot-msg-round";
    msg.textContent = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

{% endblock %}
