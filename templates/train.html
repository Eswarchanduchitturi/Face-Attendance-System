{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card">
            <h3 class="mb-3 text-center">
                <i class="fa-solid fa-brain"></i>
                Model Training
            </h3>

            <div class="mb-3">
                <div class="progress" style="height: 18px;">
                    <div id="trainProgressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                         role="progressbar" style="width: 0%;">0%</div>
                </div>
            </div>

            <div id="trainStatus" class="alert alert-info mb-2">Training queued...</div>
            <div id="trainError" class="alert alert-danger d-none mb-2"></div>

            <div class="mt-3">
                <a href="/" class="btn btn-primary w-100 mb-2">
                    Go to Live Recognition
                </a>
                <a href="/attendance" class="btn btn-secondary w-100">
                    View Attendance
                </a>
            </div>
        </div>

    </div>
</div>

<script>
const jobId = {{ job_id|tojson }};
const statusEl = document.getElementById("trainStatus");
const errorEl = document.getElementById("trainError");
const progressBar = document.getElementById("trainProgressBar");

function setProgress(pct) {
    const value = Math.max(0, Math.min(100, Number(pct || 0)));
    progressBar.style.width = `${value}%`;
    progressBar.innerText = `${value}%`;
}

async function pollTrainingStatus() {
    try {
        const res = await fetch(`/train_test_progress?job_id=${encodeURIComponent(jobId)}`);
        const data = await res.json();

        setProgress(data.progress || 0);
        statusEl.innerText = data.message || "Training in progress...";

        if (data.status === "success") {
            statusEl.className = "alert alert-success mb-2";
            statusEl.innerText = "Training completed successfully.";
            progressBar.classList.remove("progress-bar-animated");
            return;
        }

        if (data.status === "fail") {
            statusEl.className = "alert alert-danger mb-2";
            errorEl.classList.remove("d-none");
            errorEl.innerText = data.error || "Training failed.";
            progressBar.classList.remove("progress-bar-animated");
            return;
        }

        setTimeout(pollTrainingStatus, 1200);
    } catch (e) {
        statusEl.className = "alert alert-warning mb-2";
        statusEl.innerText = "Could not fetch training status. Retrying...";
        setTimeout(pollTrainingStatus, 2000);
    }
}

pollTrainingStatus();
</script>

{% endblock %}
