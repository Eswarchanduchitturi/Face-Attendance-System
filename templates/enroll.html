{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

    <div class="text-center mb-5">
        <h1 class="fw-bold">Face Attendance System</h1>
        <p class="text-muted">Employee Face Enrollment</p>
    </div>

    <!-- FORM -->
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="enrollment-form-card">
                <form id="enrollForm">

                    <div class="form-group">
                        <input type="number" name="user_id" id="userId"
                               class="form-control modern-input"
                               placeholder="ID" required>
                        <small id="userCheckMsg" class="d-none text-muted form-helper"></small>
                    </div>

                    <div class="form-group">
                        <input type="text" name="name" id="userName"
                               class="form-control modern-input"
                               placeholder="Full Name" required>
                    </div>

                    <input type="hidden" name="role" value="employee">
                    
                    <button type="submit" id="submitBtn" class="btn btn-modern w-100">
                        <span>Start Enrollment</span>
                        <span class="btn-icon">→</span>
                    </button>

                </form>
            </div>

        </div>
    </div>

</div>

<style>
/* ================= MODERN ENROLLMENT FORM ================= */
.enrollment-form-card {
    background: white;
    padding: 32px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    transition: all 0.3s ease;
}

.enrollment-form-card:hover {
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
}

.form-group {
    margin-bottom: 16px;
}

.modern-input {
    border: 2px solid #e5e5e5 !important;
    border-radius: 12px !important;
    padding: 12px 16px !important;
    font-size: 14px !important;
    transition: all 0.3s ease !important;
    background: #fafafa !important;
    color: #111 !important;
}

.modern-input:focus {
    border-color: #0d6efd !important;
    background: white !important;
    box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.18) !important;
    outline: none !important;
}

.modern-input::placeholder {
    color: #ccc !important;
}

.form-helper {
    display: block;
    margin-top: 6px;
    font-size: 12px;
}

.btn-modern {
    background: linear-gradient(135deg, #121417 0%, #0d6efd 100%) !important;
    border: none !important;
    border-radius: 12px !important;
    padding: 14px 24px !important;
    font-weight: 600 !important;
    font-size: 15px !important;
    color: white !important;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 8px !important;
    position: relative !important;
    overflow: hidden !important;
}

.btn-modern:hover:not(:disabled) {
    transform: translateY(-2px) !important;
    box-shadow: 0 10px 26px rgba(13, 110, 253, 0.34) !important;
}

.btn-modern:active:not(:disabled) {
    transform: translateY(0) !important;
}

.btn-modern:disabled {
    opacity: 0.6 !important;
    cursor: not-allowed !important;
}

.btn-icon {
    display: inline-block;
    transition: transform 0.3s ease;
}

.btn-modern:hover:not(:disabled) .btn-icon {
    transform: translateX(4px);
}

/* ================= FORM ANIMATIONS ================= */
.form-group input,
.form-group select {
    animation: slideInUp 0.4s ease forwards;
}

.form-group:nth-child(1) input {
    animation-delay: 0.05s;
}

.form-group:nth-child(2) input {
    animation-delay: 0.1s;
}

.form-group:nth-child(3) select {
    animation-delay: 0.15s;
}

#submitBtn {
    animation: slideInUp 0.4s ease forwards;
    animation-delay: 0.2s;
}

@keyframes slideInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>


<!-- ================= MODERN ENROLLMENT MODAL ================= -->
<div id="enrollOverlay" class="modern-overlay d-none">
    
    <div class="modern-enrollment-container">
        
        <!-- CAMERA FEED -->
        <div class="camera-feed-container">
            <video id="enrollmentCamera" class="enrollment-camera-stream" playsinline autoplay muted></video>
            <div class="camera-loading">
                <div class="loader-spinner"></div>
                <p>Initializing Camera...</p>
            </div>
        </div>
        
        <!-- RIGHT SIDE - PROGRESS -->
        <div class="enrollment-progress-side">
            
            <!-- HEADER -->
            <div class="enrollment-header">
                <h2>Face Enrollment</h2>
                <p>Complete enrollment process</p>
            </div>
            
            <!-- STEP INDICATOR -->
            <div class="step-indicators">
                <div id="currentStep" class="step-counter">Step <span id="stepNum">1</span> of <span id="totalSteps">6</span></div>
                <div class="step-dots">
                    <div class="step-dot active" id="dot0"></div>
                    <div class="step-dot" id="dot1"></div>
                    <div class="step-dot" id="dot2"></div>
                    <div class="step-dot" id="dot3"></div>
                    <div class="step-dot" id="dot4"></div>
                    <div class="step-dot" id="dot5"></div>
                </div>
            </div>
            
            <!-- CONTENT AREA -->
            <div class="enrollment-content">
                
                <div class="step-card active" id="stepCard0">
                    <div class="step-icon">🎥</div>
                    <h3 id="stepTitle">Camera Initialization</h3>
                    <p id="stepDesc">Preparing your camera for face capture</p>
                    <div class="step-media-wrap">
                        <img id="stepGif" class="step-media" src="{{ url_for('static', filename='images/enroll_steps/camera.gif') }}" alt="Enrollment step animation">
                    </div>
                    <div class="animated-loader">
                        <div class="loader-dot"></div>
                        <div class="loader-dot"></div>
                        <div class="loader-dot"></div>
                    </div>
                </div>
                
            </div>
            
            <!-- LINEAR PROGRESS BAR -->
            <div class="linear-progress-wrapper">
                <div class="linear-progress">
                    <div id="progressLine" class="progress-fill"></div>
                </div>
                <span id="progressText" class="progress-text">0%</span>
            </div>
            
        </div>
        
    </div>
    
</div>

<!-- ================= ALERT CARD POPUP ================= -->
<div id="alertCard" class="alert-card-popup d-none">
    <div class="alert-card-content">
        <div class="alert-icon" id="alertIcon">⚠️</div>
        <h3 id="alertTitle">Alert</h3>
        <p id="alertMessage"></p>
        <button id="alertCloseBtn" class="alert-btn">Close</button>
    </div>
</div>

<style>
/* ================= CAMERA FEED ================= */
.camera-feed-container {
    position: relative;
    width: 50%;
    height: 100%;
    background: #000;
    border-radius: 20px 0 0 20px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

.enrollment-camera-stream {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.camera-loading {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: white;
    z-index: 10;
}

.loader-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ================= ENROLLMENT PROGRESS SIDE ================= */
.enrollment-progress-side {
    width: 50%;
    display: flex;
    flex-direction: column;
    padding: 40px;
    overflow-y: auto;
}

/* ================= MODERN ENROLLMENT STYLES (UPDATED) ================= */
.modern-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #edf7f6 0%, #f4f6fa 55%, #fff2e8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(5px);
}

.modern-enrollment-container {
    background: #ffffff;
    border-radius: 24px;
    width: 90%;
    max-width: 1000px;
    height: 70vh;
    max-height: 650px;
    box-shadow: 0 20px 60px rgba(28, 52, 74, 0.18);
    animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    overflow: hidden;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.enrollment-header {
    text-align: center;
    margin-bottom: 20px;
}

.enrollment-header h2 {
    font-size: 24px;
    font-weight: 700;
    color: #111;
    margin: 0 0 4px 0;
}

.enrollment-header p {
    color: #999;
    font-size: 13px;
    margin: 0;
}

/* STEP INDICATORS */
.step-indicators {
    margin-bottom: 20px;
}

.step-counter {
    text-align: center;
    font-size: 11px;
    color: #999;
    font-weight: 600;
    margin-bottom: 12px;
    display: block;
}

.step-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
}

.step-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #e5e5e5;
    transition: all 0.3s ease;
    cursor: default;
}

.step-dot.active {
    background: #0d6efd;
    width: 20px;
    border-radius: 5px;
    animation: dotPulse 1.2s ease-in-out infinite;
}

@keyframes dotPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

.step-dot.completed {
    background: #111111;
}

/* ENROLLMENT CONTENT */
.enrollment-content {
    flex: 1;
    min-height: 180px;
    margin: 15px 0;
    perspective: 1000px;
}

.step-card {
    text-align: center;
    opacity: 0;
    transform: translateX(40px);
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.step-card.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}

.step-icon {
    font-size: 48px;
    margin-bottom: 12px;
    animation: iconBounce 0.6s ease infinite;
}

@keyframes iconBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

.step-card h3 {
    font-size: 18px;
    font-weight: 600;
    color: #111;
    margin: 0 0 6px 0;
}

.step-card p {
    color: #999;
    font-size: 13px;
    margin: 0 0 18px 0;
}

.step-media-wrap {
    display: flex;
    justify-content: center;
    margin: 4px 0 14px;
}

.step-media {
    width: min(100%, 240px);
    height: 136px;
    border-radius: 14px;
    object-fit: cover;
    border: 1px solid #d8dee7;
    box-shadow: 0 10px 24px rgba(17, 23, 33, 0.10);
    background: #eef3f8;
}

/* ANIMATED LOADER */
.animated-loader {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
}

.loader-dot {
    width: 10px;
    height: 10px;
    background: #0d6efd;
    border-radius: 50%;
    animation: dotWave 1.4s ease-in-out infinite;
}

.loader-dot:nth-child(2) {
    animation-delay: 0.2s;
}

.loader-dot:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes dotWave {
    0%, 60%, 100% { transform: scale(1); opacity: 0.5; }
    30% { transform: scale(1.3); opacity: 1; }
}

/* ANIMATED LOADER */
.animated-loader {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
}

.loader-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #0d6efd;
    animation: loaderBounce 1.4s infinite ease-in-out;
}

.loader-dot:nth-child(1) {
    animation-delay: 0s;
}

.loader-dot:nth-child(2) {
    animation-delay: 0.2s;
}

.loader-dot:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes loaderBounce {
    0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.6;
    }
    40% {
        transform: translateY(-12px);
        opacity: 1;
    }
}

/* PROGRESS BAR */
.linear-progress-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
}

.linear-progress {
    flex: 1;
    height: 3px;
    background: #e5e5e5;
    border-radius: 2px;
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0d6efd, #cf2e2e);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 10px rgba(13, 110, 253, 0.35);
}

.progress-text {
    font-size: 11px;
    font-weight: 700;
    color: #0d6efd;
    min-width: 30px;
    text-align: right;
}

/* ================= ALERT CARD POPUP ================= */
.alert-card-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
    animation: popupSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.alert-card-popup.d-none {
    display: none !important;
}

@keyframes popupSlideIn {
    from {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.9);
    }
    to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
}

.alert-card-popup::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 22% 18%, rgba(13, 110, 253, 0.24) 0%, rgba(7, 11, 16, 0.62) 42%, rgba(5, 8, 12, 0.82) 100%);
    backdrop-filter: blur(10px) saturate(120%);
    z-index: -1;
    animation: overlayBreath 2.4s ease-in-out infinite;
}

@keyframes overlayBreath {
    0%, 100% { opacity: 0.88; }
    50% { opacity: 1; }
}

.alert-card-content {
    background: white;
    border-radius: 20px;
    padding: 32px;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    text-align: center;
    animation: cardBounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes cardBounceIn {
    0% {
        opacity: 0;
        transform: scale(0.8);
    }
    70% {
        transform: scale(1.05);
    }
    100% {
        opacity: 1;
        transform: scale(1);
    }
}

.alert-icon {
    font-size: 48px;
    margin-bottom: 16px;
}

.alert-card-content h3 {
    font-size: 20px;
    font-weight: 700;
    color: #111;
    margin: 0 0 8px 0;
}

.alert-card-content p {
    color: #666;
    font-size: 14px;
    margin: 0 0 24px 0;
    line-height: 1.5;
}

.alert-btn {
    background: linear-gradient(135deg, #121417 0%, #0d6efd 100%);
    border: none;
    border-radius: 10px;
    color: white;
    padding: 12px 32px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.alert-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 22px rgba(13, 110, 253, 0.32);
}

.alert-btn:active {
    transform: translateY(0);
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .modern-enrollment-container {
        width: 95%;
        max-width: none;
        height: 80vh;
        flex-direction: column;
    }
    
    .camera-feed-container {
        width: 100%;
        height: 40%;
        border-radius: 20px 20px 0 0;
    }
    
    .enrollment-progress-side {
        width: 100%;
        height: 60%;
        padding: 30px 20px;
    }
}

@media (max-width: 640px) {
    .modern-enrollment-container {
        height: 90vh;
    }
    
    .alert-card-content {
        max-width: 90vw;
        padding: 24px;
    }
    
    .enrollment-header h2 {
        font-size: 20px;
    }
}
</style>


<script>

const steps = [
    {
        title: "Camera Initialization",
        desc: "Preparing your camera for face capture",
        icon: "🎥",
        progress: 15,
        image: "{{ url_for('static', filename='images/enroll_steps/camera.gif') }}"
    },
    {
        title: "Face Detection",
        desc: "Scanning for your face (12 captures)",
        icon: "👤",
        progress: 30,
        image: "{{ url_for('static', filename='images/enroll_steps/capture.gif') }}"
    },
    {
        title: "Image Preprocessing",
        desc: "Processing captured images",
        icon: "⚙️",
        progress: 50,
        image: "{{ url_for('static', filename='images/enroll_steps/preprocess.png') }}"
    },
    {
        title: "Feature Extraction",
        desc: "Analyzing facial features (LBPH)",
        icon: "🔍",
        progress: 70,
        image: "{{ url_for('static', filename='images/enroll_steps/lbph.png') }}"
    },
    {
        title: "Model Training",
        desc: "Training recognition model",
        icon: "🤖",
        progress: 85,
        image: "{{ url_for('static', filename='images/enroll_steps/training.gif') }}"
    },
    {
        title: "Enrollment Complete",
        desc: "Face model saved successfully!",
        icon: "✅",
        progress: 100,
        image: "{{ url_for('static', filename='images/enroll_steps/success.gif') }}"
    }
];

let currentStep = 0;

/* ================= ALERT CARD FUNCTIONS ================= */
function showAlertCard(title, message, icon = "⚠️") {
    document.getElementById("alertIcon").textContent = icon;
    document.getElementById("alertTitle").textContent = title;
    document.getElementById("alertMessage").textContent = message;
    document.getElementById("alertCard").classList.remove("d-none");
}

function formatDuplicateDebug(debugData) {
    if (!debugData || !Array.isArray(debugData.top_candidates) || debugData.top_candidates.length === 0) {
        return "";
    }

    const lines = [];
    lines.push("");
    lines.push("Debug info:");
    const strongConf = debugData.strong_duplicate_conf !== undefined
        ? `, Strong Match: ${debugData.strong_duplicate_conf}`
        : "";
    lines.push(`Threshold: ${debugData.duplicate_conf_threshold}${strongConf}, Required Hits: ${debugData.required_hits}`);
    if (debugData.best_avg_conf !== undefined && debugData.second_best_avg_conf !== undefined) {
        lines.push(`Best Avg: ${debugData.best_avg_conf}, Second Avg: ${debugData.second_best_avg_conf}, Margin: ${debugData.confidence_margin}`);
    }

    for (const row of debugData.top_candidates) {
        lines.push(
            `- ID ${row.user_id} (${row.name}) | hits=${row.hits} | best=${row.best_conf} | avg=${row.avg_conf}`
        );
    }

    return lines.join("\n");
}

function closeAlertCard() {
    document.getElementById("alertCard").classList.add("d-none");
}

document.getElementById("alertCloseBtn").addEventListener("click", closeAlertCard);
document.getElementById("alertCard").addEventListener("click", function(e) {
    if (e.target === this) closeAlertCard();
});

/* ================= CAMERA STREAM ================= */
async function startCameraStream() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user' }
        });
        const videoElement = document.getElementById('enrollmentCamera');
        videoElement.srcObject = stream;
        
        // Hide loading indicator when camera starts
        setTimeout(() => {
            if (document.querySelector('.camera-loading')) {
                document.querySelector('.camera-loading').style.display = 'none';
            }
        }, 500);
        
        return stream;
    } catch (e) {
        console.error('Camera error:', e);
        showAlertCard("Camera Error", "Could not access camera. Please allow camera permissions.", "📷");
    }
}

function stopCameraStream() {
    const videoElement = document.getElementById('enrollmentCamera');
    if (videoElement.srcObject) {
        videoElement.srcObject.getTracks().forEach(track => track.stop());
    }
}

function updateStep(stepIndex) {
    currentStep = stepIndex;
    const step = steps[stepIndex];
    if (!step) return;
    
    // Update step card
    document.querySelectorAll('.step-card').forEach(card => {
        card.classList.remove('active');
    });
    
    const stepCard = document.getElementById('stepCard0');
    if (stepCard) {
        stepCard.classList.add('active');
    }
    
    // Update dots
    document.querySelectorAll('.step-dot').forEach((dot, i) => {
        dot.classList.remove('active', 'completed');
        if (i === stepIndex) {
            dot.classList.add('active');
        } else if (i < stepIndex) {
            dot.classList.add('completed');
        }
    });
    
    // Update progress
    const progress = step.progress;
    document.getElementById('progressLine').style.width = progress + '%';
    document.getElementById('progressText').textContent = progress + '%';
    document.getElementById('stepNum').textContent = stepIndex + 1;

    const stepTitle = document.getElementById('stepTitle');
    const stepDesc = document.getElementById('stepDesc');
    const stepIcon = document.querySelector('#stepCard0 .step-icon');
    const stepGif = document.getElementById('stepGif');

    if (stepTitle) stepTitle.textContent = step.title;
    if (stepDesc) stepDesc.textContent = step.desc;
    if (stepIcon) stepIcon.textContent = step.icon;
    if (stepGif) stepGif.src = step.image;
}

/* ================= CHECK USER EXISTENCE ================= */
document.getElementById("userId").addEventListener("blur", async function() {
    const userId = this.value;
    const checkMsg = document.getElementById("userCheckMsg");
    const submitBtn = document.getElementById("submitBtn");
    
    if (!userId) {
        checkMsg.classList.add("d-none");
        submitBtn.disabled = false;
        return;
    }
    
    try {
        const response = await fetch(`/check_user/${userId}`);
        const data = await response.json();
        
        if (data.exists && data.allow_reenroll) {
            checkMsg.innerHTML = `<span style="color: #0d6efd;">♻️ User ID ${userId} exists as "${data.user_name}". Re-enrollment will refresh face samples.</span>`;
            checkMsg.classList.remove("d-none");
            submitBtn.disabled = false;
        } else if (data.exists) {
            checkMsg.innerHTML = `<span style="color: red;">❌ User ID ${userId} already enrolled as "${data.user_name}"</span>`;
            checkMsg.classList.remove("d-none");
            submitBtn.disabled = true;
        } else if (data.orphan_images) {
            checkMsg.innerHTML = `<span style="color: #d97706;">⚠️ Old face images found for ID ${userId}. They will be cleaned automatically on enroll.</span>`;
            checkMsg.classList.remove("d-none");
            submitBtn.disabled = false;
        } else {
            checkMsg.innerHTML = `<span style="color: green;">✅ User ID available</span>`;
            checkMsg.classList.remove("d-none");
            submitBtn.disabled = false;
        }
    } catch (e) {
        console.error("Error checking user:", e);
    }
});

document.getElementById("enrollForm").onsubmit = async function(e){
    e.preventDefault();

    const form = new FormData(e.target);
    const userId = form.get("user_id");

    // Pre-flight check
    try {
        const checkResponse = await fetch(`/check_user/${userId}`);
        const checkData = await checkResponse.json();
        if (checkData.exists && !checkData.allow_reenroll) {
            showAlertCard("User Already Enrolled", `User ID ${userId} is already enrolled!`, "X");
            return;
        }
    } catch (e) {
        console.error("Pre-flight check error:", e);
    }

    try {
        document.getElementById("enrollOverlay").classList.remove("d-none");
        currentStep = 0;
        updateStep(0);

        const previewStream = await startCameraStream();
        if (!previewStream) {
            document.getElementById("enrollOverlay").classList.add("d-none");
            return;
        }

        await new Promise(r => setTimeout(r, 500));

        for(let i = 0; i < steps.length; i++){
            await new Promise(r => setTimeout(r, 800));
            updateStep(i);
        }

        await new Promise(r => setTimeout(r, 500));

        const enrollResponse = await fetch("/enroll", { method:"POST", body: form });

        if (!enrollResponse.ok) {
            const errorData = await enrollResponse.json();
            if (errorData.status === "duplicate_face") {
                showAlertCard("Duplicate User Found", errorData.message, "!");
            } else {
                showAlertCard("Enrollment Error", errorData.message, "X");
            }
            return;
        }

        stopCameraStream();
        await new Promise(r => setTimeout(r, 400));

        const captureResponse = await fetch(`/capture/${userId}`);
        const result = await captureResponse.json();

        if (result.status === "duplicate_face") {
            const debugText = formatDuplicateDebug(result.debug);
            showAlertCard("Duplicate Face Detected", `${result.message}${debugText}`, "!");
            return;
        }

        if (result.trained) {
            showAlertCard("Success! OK", "Enrollment & Training Completed Successfully!", "OK");
            setTimeout(() => {
                closeAlertCard();
                document.getElementById("enrollForm").reset();
                document.getElementById("userCheckMsg").classList.add("d-none");
                document.getElementById("submitBtn").disabled = false;
            }, 2000);
        } else {
            showAlertCard("Training Failed", "Enrollment completed but training failed. Please train manually.", "!");
        }
    } catch (err) {
        console.error("Enrollment flow error:", err);
        showAlertCard("Enrollment Error", "Unexpected error occurred. Please try again.", "X");
    } finally {
        stopCameraStream();
        document.getElementById("enrollOverlay").classList.add("d-none");
    }
};

</script>
